spring.application.name=Tasks API

# App / JWT
# NOTE: override APP_JWT_SECRET in prod (Render). Needs 32+ chars for HS256.
app.jwt.secret=${APP_JWT_SECRET:change-me-change-me-change-me-change-me}
app.jwt.issuer=${APP_JWT_ISSUER:tasks-api}
app.jwt.access-token-minutes=${APP_JWT_ACCESS_MINUTES:15}
app.jwt.refresh-token-days=${APP_JWT_REFRESH_DAYS:14}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:task_app_db}
spring.datasource.username=${DB_USER:ryan}
spring.datasource.password=${DB_PASSWORD:password123}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=tasks
spring.flyway.default-schema=tasks

# Hibernate
spring.jpa.properties.hibernate.default_schema=tasks
